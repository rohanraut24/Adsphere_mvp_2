<div class="space-y-5">
  <div>
    <h1 class="page-title">Upgrade Requests</h1>
    <p class="text-sm text-gray-500 mt-0.5">{{ requests.length }} pending request{{ requests.length !== 1 ? 's' : '' }}</p>
  </div>

  <div class="space-y-4">
    <div *ngIf="loading" class="animate-pulse space-y-3">
      <div *ngFor="let i of [1, 2, 3]" class="h-28 bg-gray-200 rounded-2xl"></div>
    </div>
    <div *ngIf="!loading && requests.length === 0" class="card flex flex-col items-center py-20 text-center">
      <svg lucideIcon="shield-check" [size]="40" class="text-emerald-200 mb-3"></svg>
      <p class="text-gray-500 font-medium">No pending requests</p>
      <p class="text-gray-400 text-sm mt-1">All upgrade requests have been reviewed</p>
    </div>
    <div *ngIf="!loading && requests.length > 0">
      <div *ngFor="let r of requests" class="card p-5 mb-4">
        <div class="flex items-start justify-between gap-4 flex-wrap">
          <div class="flex items-start gap-4">
            <div class="w-10 h-10 rounded-full bg-violet-100 text-violet-600 flex items-center justify-center font-bold text-sm shrink-0">
              {{ r.userEmail?.slice(0, 2).toUpperCase() }}
            </div>
            <div>
              <div class="flex items-center gap-2 flex-wrap">
                <p class="font-semibold text-gray-900">{{ r.userEmail }}</p>
                <span class="text-gray-400 text-xs">→</span>
                <app-badge [status]="r.requestedRole"></app-badge>
              </div>
              <p class="text-sm text-gray-500 mt-1">{{ r.reason }}</p>
              <p class="text-xs text-gray-400 mt-1">Submitted {{ r.createdAt | date:'shortDate' }}</p>
            </div>
          </div>
          <app-badge [status]="r.status"></app-badge>
        </div>

        <div class="mt-4 pt-4 border-t border-gray-100 flex items-center gap-3 flex-wrap">
          <div class="flex-1 min-w-0">
            <input
              placeholder="Add a review note (optional)…"
              [(ngModel)]="notes[r.id]"
              class="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 w-full"
            />
          </div>
          <div class="flex gap-2 shrink-0">
            <button (click)="review(r.id, 'APPROVED')"
              class="flex items-center gap-1.5 btn-success px-4 py-2 text-sm">
              <svg lucideIcon="check-circle" [size]="14"></svg> Approve
            </button>
            <button (click)="review(r.id, 'REJECTED')"
              class="flex items-center gap-1.5 btn-danger px-4 py-2 text-sm">
              <svg lucideIcon="x" [size]="14"></svg> Reject
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
