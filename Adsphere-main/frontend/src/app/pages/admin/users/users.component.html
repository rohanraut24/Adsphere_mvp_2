<div class="space-y-5">
  <div>
    <h1 class="page-title">User Management</h1>
    <p class="text-sm text-gray-500 mt-0.5">{{ users.length }} user{{ users.length !== 1 ? 's' : '' }} {{ role !== 'ALL' ? 'with role ' + role : 'total' }}</p>
  </div>

  <div class="flex flex-wrap gap-3 items-center">
    <div class="relative">
      <svg lucideIcon="search" [size]="14" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></svg>
      <input [(ngModel)]="search" placeholder="Search by name or email…"
        class="border border-gray-200 rounded-xl pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white w-64" />
    </div>
    <div class="flex gap-1 flex-wrap">
      <button *ngFor="let r of ROLES" (click)="onRoleChange(r)"
        class="px-3 py-1.5 rounded-full text-xs font-semibold transition cursor-pointer"
        [ngClass]="role === r ? 'bg-indigo-600 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'">
        {{ r.replace('_', ' ') }}
      </button>
    </div>
  </div>

  <div class="card overflow-hidden">
    <div *ngIf="loading" class="animate-pulse p-6 space-y-3">
      <div *ngFor="let i of [1, 2, 3, 4, 5]" class="h-12 bg-gray-100 rounded-xl"></div>
    </div>
    <div *ngIf="!loading && visibleUsers.length === 0" class="flex flex-col items-center py-20 text-center">
      <svg lucideIcon="users" [size]="40" class="text-gray-200 mb-3"></svg>
      <p class="text-gray-500 font-medium">No users found</p>
    </div>
    <div *ngIf="!loading && visibleUsers.length > 0">
      <table class="w-full">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="th text-left">User</th>
            <th class="th text-left">Role</th>
            <th class="th text-left">Status</th>
            <th class="th text-left">Joined</th>
            <th class="th text-left">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr *ngFor="let u of visibleUsers" class="hover:bg-gray-50 transition-colors">
            <td class="td">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs font-bold shrink-0">
                  {{ getInitials(u.fullName) }}
                </div>
                <div>
                  <p class="font-semibold text-gray-900">{{ u.fullName }}</p>
                  <p class="text-xs text-gray-400">{{ u.email }}</p>
                </div>
              </div>
            </td>
            <td class="td"><app-badge [status]="u.role"></app-badge></td>
            <td class="td"><app-badge [status]="u.status"></app-badge></td>
            <td class="td text-xs text-gray-500">{{ u.createdAt | date:'shortDate' }}</td>
            <td class="td">
              <div class="flex gap-1.5">
                <button *ngIf="u.status !== 'SUSPENDED'" (click)="action(suspendUserFn, u.id)"
                  class="flex items-center gap-1 btn-danger">
                  <svg lucideIcon="user-x" [size]="12"></svg> Suspend
                </button>
                <button *ngIf="u.status === 'SUSPENDED'" (click)="action(activateUserFn, u.id)"
                  class="flex items-center gap-1 btn-success">
                  <svg lucideIcon="user-check" [size]="12"></svg> Activate
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
